services:
  postgres:
    image: postgres:16
    container_name: farm-marketplace-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - farm_marketplace_pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ../seeds:/docker-entrypoint-initdb.d/seeds:ro
      - ./initdb/000_run_sql.sh:/docker-entrypoint-initdb.d/000_run_sql.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  farm_marketplace_pgdata:
    name: farm_marketplace_pgdata
